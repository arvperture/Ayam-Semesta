<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">
<title>LookUp Agents</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
/** @type {import('tailwindcss').Config} */
    tailwind.config = {
      corePlugins: {
        preflight: false,
      },
      theme: {
        extend: {},
      },
      plugins: [],
    }
  </script>
</head>
<body class="bg-black">
<main id="main-content" class="relative min-h-[1852px] w-full overflow-hidden bg-black">
<img
      class="absolute left-0 top-0 h-[1852px] w-full object-cover"
      src="Image Source/couple-night-romantic-dark-sky-lone-tree-silhouette-3840x2160-6074.jpg"
      alt=""
      aria-hidden="true"
    >
<h1 class="absolute left-0 top-[164px] flex h-[1688px] w-full items-center justify-center m-0">
<img
        class="ml-[-0.7px] mt-[-1439.4px] h-[101.3px] w-[579.92px]"
        src="Image Source/couple-night-romantic-dark-sky-lone-tree-silhouette-3840x2160-6074.jpg"
        alt="Save your time, then enjoy the sparkling night stars."
      >
</h1>
<section class="absolute left-1/2 top-[249px] flex h-[265px] w-[829px] -translate-x-1/2" aria-labelledby="lookup-agents-title">
<form class="relative ml-[26px] mt-[142px] h-[113px] w-[781px]" role="search">
<div
          class="absolute left-0 top-0 h-[113px] w-[777px] rounded-[29px] backdrop-blur-[50.0px] backdrop-brightness-[100.0%] backdrop-saturate-[105.0%] [-webkit-backdrop-filter:blur(50.0px)_brightness(100.0%)_saturate(105.0%)] shadow-[inset_0_1px_0_rgba(255,255,255,0.40),inset_1px_0_0_rgba(255,255,255,0.32),inset_0_-1px_33px_rgba(0,0,0,0.08),inset_-1px_0_33px_rgba(0,0,0,0.06)] [background:linear-gradient(180deg,rgba(77,59,112,0.2)_0%,rgba(64,48,96,0.2)_100%)]"
          aria-hidden="true"
        ></div>
<h2 id="lookup-agents-title" class="absolute left-[calc(50.00%_-_340px)] top-[calc(50.00%_-_40px)] m-0 w-[447px] [text-shadow:0px_0px_4px_#ffffff75] [font-family:'Inter-Bold',Helvetica] font-normal text-[17px] leading-[normal] tracking-[0] text-white">
<span class="[font-family:'Inter-BoldItalic',Helvetica] font-bold italic">LookUp</span>
<span class="font-bold">&nbsp;</span>
<span class="[font-family:'Inter-Regular',Helvetica]">Agents</span>
</h2>
<fieldset class="absolute left-0 top-0 m-0 border-0 p-0">
<legend class="sr-only">Search lookup agents</legend>
<div class="absolute left-8 top-[50px] h-[30px] w-[427px]">
<label class="sr-only" for="destination">Destination and country</label>
<div class="absolute left-0 top-0 h-[30px] w-[425px] rounded-[18px] bg-[#d9d9d9]" aria-hidden="true"></div>
<input
              id="destination"
              name="destination"
              type="search"
              autocomplete="off"
              placeholder="Malang, Indonesia"
              class="absolute left-[26px] top-[5px] h-[18px] w-44 appearance-none border-0 bg-transparent p-0 [font-family:'Inter-Regular',Helvetica] text-sm font-normal leading-[normal] tracking-[0] text-[#929292] placeholder:text-[#929292] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
            >
<button
              class="absolute left-[391px] top-1.5 h-[17px] w-[17px] appearance-none border-0 bg-transparent p-0"
              type="submit"
              aria-label="Search by destination"
            >
<img class="h-[17px] w-[17px] object-cover" src="Image Source/icons8-search-50.png" alt="">
</button>
</div>
<div class="absolute left-[475px] top-[49px] h-[30px] w-[273px]">
<label class="sr-only" for="device">Device model</label>
<div class="absolute left-0 top-0 h-[30px] w-[271px] rounded-[18px] bg-[#d9d9d9]" aria-hidden="true"></div>
<input
              id="device"
              name="device"
              type="search"
              autocomplete="off"
              placeholder="Your Phone / Camera Model"
              class="absolute left-[22px] top-1.5 h-[18px] w-44 appearance-none border-0 bg-transparent p-0 [font-family:'Inter-Regular',Helvetica] text-sm font-normal leading-[normal] tracking-[0] text-[#929292] placeholder:text-[#929292] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
            >
<button
              class="absolute left-[237px] top-1.5 h-[17px] w-[17px] appearance-none border-0 bg-transparent p-0"
              type="submit"
              aria-label="Search by device model"
            >
<img class="h-[17px] w-[17px] object-cover" src="Image Source/icons8-search-50.png" alt="">
</button>
</div>
</fieldset>
<p class="absolute left-[calc(50.00%_-_340px)] top-[calc(50.00%_+_32px)] m-0 w-[143px] [text-shadow:0px_0px_4px_#ffffff75] [font-family:'Inter-Italic',Helvetica] text-[9px] font-normal italic leading-[normal] tracking-[0] text-white">
*Format: [Destination],[Country]
        </p>
</form>
</section>
<header class="absolute left-0 top-0 h-[164px] w-full bg-transparent">
<img class="absolute left-1/2 top-[49px] h-[61px] w-[min(1299px,calc(100%-32px))] -translate-x-1/2" src="img/rectangle-5.svg" alt="" aria-hidden="true">
<a
        class="absolute left-[calc(50.00%_-_580px)] top-[calc(50.00%_-_19px)] block w-[124px] [font-family:'Inter-BoldItalic',Helvetica] text-center text-[26px] font-bold italic leading-[normal] tracking-[0] text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
        href="#main-content"
      >
LookUp
      </a>
<nav aria-label="Primary navigation">
<a
          class="absolute left-[calc(50.00%_-_141px)] top-[calc(50.00%_-_18px)] block w-[125px] [font-family:'Inter-Regular',Helvetica] text-center text-[25px] font-normal leading-[normal] tracking-[0] text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
          href="#main-content"
        >
About Us
        </a>
<a
          class="absolute left-[calc(50.00%_-_1px)] top-[calc(50.00%_-_18px)] block w-[125px] [font-family:'Inter-Regular',Helvetica] text-center text-[25px] font-normal leading-[normal] tracking-[0] text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
          href="#main-content"
        >
Home
        </a>
</nav>
<a
        class="absolute left-[1197px] top-[59px] block h-[41px] w-[145px] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
        href="https://github.com/arvperture/Ayam-Semesta.git"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View the LookUp project on GitHub"
      >
<img class="h-[41px] w-[145px] object-cover" src="img/github-lockup-white-clearspace-1.png" alt="">
</a>
</header>
</main>
</body>
</html>
