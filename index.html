<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LookUp AI Test Input</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      background: radial-gradient(circle at top, rgba(99, 102, 241, 0.2), transparent 36%),
        linear-gradient(180deg, #030712 0%, #090a14 100%);
    }
  </style>
</head>

<body class="min-h-screen text-slate-100 antialiased">
  <div class="mx-auto flex min-h-screen w-full max-w-3xl items-center justify-center px-4 py-8">
    <div
      class="w-full rounded-3xl border border-slate-700/80 bg-slate-950/80 p-8 shadow-2xl shadow-slate-900/50 backdrop-blur-xl">
      <header class="mb-8 text-center">
        <p class="text-sm uppercase tracking-[0.35em] text-indigo-300/80">LookUp Input Test</p>
        <h1 class="mt-4 text-4xl font-semibold text-white">Input Your Destination Area & Camera Gear</h1>
        <p class="mt-2 text-slate-400">Just to test the AI prompt template input.</p>
      </header>

      <form id="lookupForm" class="space-y-6">
        <div>
          <label for="destinationTarget" class="mb-2 block text-sm font-medium text-slate-200">Destination
            Target</label>
          <input id="destinationTarget" name="destinationTarget" type="text" placeholder="Contoh: Malang"
            class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-slate-100 outline-none transition focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/20"
            required />
        </div>

        <div>
          <label for="destinationCountry" class="mb-2 block text-sm font-medium text-slate-200">Destination
            Country</label>
          <input id="destinationCountry" name="destinationCountry" type="text" placeholder="Contoh: Indonesia"
            class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-slate-100 outline-none transition focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/20"
            required />
        </div>

        <div>
          <label for="cameraGear" class="mb-2 block text-sm font-medium text-slate-200">Phone / Gear Camera</label>
          <input id="cameraGear" name="cameraGear" type="text" placeholder="Contoh: iPhone 17 Pro Max"
            class="w-full rounded-2xl border border-slate-700 bg-slate-900/90 px-4 py-3 text-slate-100 outline-none transition focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/20"
            required />
        </div>

        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <button type="submit"
            class="inline-flex items-center justify-center rounded-full bg-indigo-500 px-6 py-3 text-sm font-semibold text-white transition hover:bg-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-300/60">
            Kirim ke AI
          </button>
          <p id="status" class="text-sm text-slate-400"></p>
        </div>
      </form>

      <div class="mt-8 rounded-3xl border border-slate-700/80 bg-slate-900/70 p-5 text-slate-200">
        <h2 class="mb-3 text-sm font-semibold uppercase tracking-[0.23em] text-indigo-300/80">Preview Prompt</h2>
        <pre id="promptPreview" class="whitespace-pre-wrap text-sm leading-6 text-slate-100"></pre>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qidnvwyagidmnlafsaer.supabase.co/';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpZG52d3lhZ2lkbW5sYWZzYWVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDMyNTAsImV4cCI6MjEwMDAxOTI1MH0.BF1QZhrLf9N4TNewm8wuM6cGoUHZK7-F3erMkKZM0cI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('lookupForm');
    const promptPreview = document.getElementById('promptPreview');
    const status = document.getElementById('status');

    const buildPrompt = (target, country, gear) => {
      return `Destination Target: ${target}\nDestination Country: ${country}\nPhone / Gear Camera: ${gear}\n\nUse this information to generate a detailed AI prompt for photography recommendations.`;
    };

    form.addEventListener('input', () => {
      const target = form.destinationTarget.value.trim();
      const country = form.destinationCountry.value.trim();
      const gear = form.cameraGear.value.trim();
      promptPreview.textContent = buildPrompt(target || '[empty]', country || '[empty]', gear || '[empty]');
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const target = form.destinationTarget.value.trim();
      const country = form.destinationCountry.value.trim();
      const gear = form.cameraGear.value.trim();

      if (!target || !country || !gear) {
        status.textContent = 'Please fill in all fields first.';
        status.classList.add('text-rose-400');
        return;
      }

      status.textContent = 'Data is ready to be sent to the AI...';
      status.classList.remove('text-rose-400');
      status.classList.add('text-emerald-300');

      const { data, error } = await supabaseClient
      .from('user_requests')
      .insert([
        {
          destinationTarget: target,
          destinationCountry: country,
          cameraGear: gear
        }
      ])
      .select();

      if (error) {
        console.error('Error Supabase:', error.message);
        status.textContent = 'Gagal menyimpan data: ' + error.message;
        status.classList.add('text-rose-400');
        return;
      }
    
      const payload = {
        destinationTarget: target,
        destinationCountry: country,
        cameraGear: gear,
        promptText: buildPrompt(target, country, gear),
      };

      console.log('AI payload:', payload);
      status.textContent = 'Payload telah ditampilkan di console. Silakan sambungkan ke endpoint AI.';
    });

    form.dispatchEvent(new Event('input'));
  </script>
</body>

</html>
